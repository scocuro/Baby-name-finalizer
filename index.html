<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>강씨 이름 후보 이어달리기</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --save: #059669;
      --discard: #ef4444;
      --exclude: #ea580c;
      --fix: #2563eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.12);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", Arial, sans-serif;
    }

    body {
      position: relative;
    }

    .drawer {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 20;
      transform: translateY(calc(-100% + 42px));
      transition: transform .24s ease;
      pointer-events: none;
    }

    .drawer.open {
      transform: translateY(0);
    }

    .drawer-panel {
      background: rgba(255,255,255,.98);
      backdrop-filter: blur(10px);
      border-bottom-left-radius: 22px;
      border-bottom-right-radius: 22px;
      box-shadow: 0 12px 28px rgba(0,0,0,.10);
      pointer-events: auto;
      overflow: hidden;
    }

    .drawer-body {
      max-height: min(62vh, 430px);
      overflow-y: auto;
      padding: 14px 14px 12px;
    }

    .toggle-wrap {
      display: flex;
      justify-content: center;
      margin-top: 8px;
      pointer-events: auto;
    }

    .toggle-btn {
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,.98);
      box-shadow: 0 8px 18px rgba(0,0,0,.10);
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 900;
      color: #374151;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .arrow {
      transition: transform .2s ease;
    }

    .drawer.open .arrow {
      transform: rotate(180deg);
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .title {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      margin-top: 4px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      border: none;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      color: #1f2937;
      background: #eef2ff;
      cursor: pointer;
    }

    .pill.red {
      background: #fee2e2;
      color: #991b1b;
    }

    .pill.gray {
      background: #f3f4f6;
      color: #374151;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .meta-card {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
    }

    .meta-card label {
      display: block;
      font-size: 11px;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .meta-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 11px;
      font-size: 14px;
      font-weight: 800;
      color: var(--text);
      background: #fff;
    }

    .stats {
      margin-top: 10px;
      padding: 12px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      font-size: 13px;
      line-height: 1.65;
      color: #374151;
    }

    .chip-section {
      margin-top: 10px;
    }

    .chip-title {
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 24px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--line);
      background: #fff;
      color: #374151;
    }

    .chip.exclude {
      background: #fff7ed;
      color: #9a3412;
      border-color: #fed7aa;
    }

    .chip.fixed {
      background: #eff6ff;
      color: #1d4ed8;
      border-color: #bfdbfe;
    }

    .chip button {
      border: none;
      background: transparent;
      color: inherit;
      font-size: 12px;
      font-weight: 900;
      padding: 0;
      line-height: 1;
      cursor: pointer;
    }

    .main {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 20px 14px 118px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .deck {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 520px;
      max-height: 860px;
    }

    .card {
      position: absolute;
      inset: 0;
      margin: auto;
      width: 100%;
      height: min(72vh, 560px);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
      padding: 16px;
      transition: transform .22s ease, opacity .22s ease;
    }

    .card.dragging {
      transition: none;
    }

    .name {
      font-size: clamp(54px, 14vw, 90px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.06em;
      margin-bottom: 16px;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.55;
      font-weight: 700;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 12px;
    }

    .mini-tag {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: #f3f4f6;
      color: #374151;
    }

    .footer-bar {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 15;
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(229,231,235,.9);
      box-shadow: 0 10px 26px rgba(0,0,0,.08);
      border-radius: 22px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .footer-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 8px;
      font-size: 12px;
      font-weight: 900;
      color: #374151;
      background: #f3f4f6;
      cursor: pointer;
    }

    .footer-btn.save {
      background: #ecfdf5;
      color: #047857;
    }

    .footer-btn.discard {
      background: #fef2f2;
      color: #b91c1c;
    }

    .footer-btn.exclude {
      background: #fff7ed;
      color: #c2410c;
    }

    .footer-btn.fix {
      background: #eff6ff;
      color: #1d4ed8;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(17,24,39,.44);
      backdrop-filter: blur(3px);
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay.show {
      display: flex;
    }

    .modal {
      width: min(440px, 100%);
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 20px 46px rgba(0,0,0,.18);
      overflow: hidden;
    }

    .modal-head {
      padding: 18px 18px 10px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }

    .modal-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 700;
    }

    .modal-body {
      padding: 0 18px 18px;
      display: grid;
      gap: 8px;
    }

    .choice-btn {
      border: none;
      width: 100%;
      text-align: left;
      padding: 14px 14px;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 900;
      color: #111827;
      background: #f8fafc;
      border: 1px solid var(--line);
      cursor: pointer;
    }

    .choice-btn.soft-red {
      background: #fff7ed;
      border-color: #fed7aa;
      color: #9a3412;
    }

    .choice-btn.soft-blue {
      background: #eff6ff;
      border-color: #bfdbfe;
      color: #1d4ed8;
    }

    .choice-btn.cancel {
      background: #f3f4f6;
      color: #374151;
    }

    /* 보관함 뒤 배경만 블러 */
    .saved-mask {
      position: fixed;
      inset: 0;
      z-index: 34;
      display: none;
      background: rgba(17,24,39,.28);
      backdrop-filter: blur(4px);
    }

    .saved-mask.show {
      display: block;
    }

    /* 보관함 패널은 블러 없이 선명하게 */
    .saved-sheet {
      position: fixed;
      inset: auto 0 0 0;
      z-index: 35;
      background: #fff;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      box-shadow: 0 -12px 30px rgba(0,0,0,.12);
      transform: translateY(100%);
      transition: transform .24s ease;
      max-height: 78vh;
      display: flex;
      flex-direction: column;
      will-change: transform;
    }

    .saved-sheet.show {
      transform: translateY(0);
    }

    .saved-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: #fff;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
    }

    .saved-title {
      font-size: 17px;
      font-weight: 900;
    }

    .saved-tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .saved-body {
      overflow: auto;
      padding: 14px 16px 24px;
      min-height: 180px;
      background: #fff;
    }

    .saved-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 8px;
    }

    .saved-item {
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px;
      font-size: 18px;
      font-weight: 900;
      text-align: center;
      letter-spacing: -0.03em;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 700;
      text-align: center;
      padding: 24px 0 8px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 98px;
      transform: translateX(-50%) translateY(10px);
      z-index: 60;
      background: rgba(17,24,39,.94);
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      padding: 12px 14px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
      max-width: calc(100vw - 32px);
      text-align: center;
      line-height: 1.4;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 480px) {
      .meta-grid {
        grid-template-columns: 1fr;
      }

      .saved-grid {
        grid-template-columns: 1fr 1fr;
      }

      .card {
        height: min(68vh, 520px);
      }

      .footer-bar {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="drawer" id="drawer">
    <div class="drawer-panel">
      <div class="drawer-body">
        <div class="title-row">
          <div>
            <div class="title">강씨 이름 후보 이어달리기</div>
            <div class="subtitle">왼쪽 보관 · 오른쪽 버림 · 위 배제 · 아래 위치 고정</div>
          </div>
          <div class="actions">
            <button class="pill" id="exportBtn">세이브 내보내기</button>
            <button class="pill gray" id="importBtn">세이브 불러오기</button>
            <button class="pill red" id="resetBtn">초기화</button>
          </div>
        </div>

        <div class="meta-grid">
          <div class="meta-card">
            <label for="projectName">프로젝트 이름</label>
            <input id="projectName" type="text" maxlength="40" placeholder="예: 강씨 이름 1차" />
          </div>
          <div class="meta-card">
            <label for="editorName">작업자 이름</label>
            <input id="editorName" type="text" maxlength="20" placeholder="예: 현서" />
          </div>
        </div>

        <div class="stats" id="stats"></div>

        <div class="chip-section">
          <div class="chip-title">배제 음절</div>
          <div class="chips" id="excludeChips"></div>
        </div>

        <div class="chip-section">
          <div class="chip-title">위치 고정</div>
          <div class="chips" id="fixedChips"></div>
        </div>
      </div>
    </div>
    <div class="toggle-wrap">
      <button class="toggle-btn" id="toggleDrawerBtn">
        설정 / 세이브
        <span class="arrow">⌄</span>
      </button>
    </div>
  </div>

  <main class="main">
    <div class="deck" id="deck"></div>
  </main>

  <div class="footer-bar">
    <button class="footer-btn save" id="saveActionBtn">왼쪽 = 보관</button>
    <button class="footer-btn discard" id="discardActionBtn">오른쪽 = 버림</button>
    <button class="footer-btn exclude" id="excludeActionBtn">위 = 음절 배제</button>
    <button class="footer-btn fix" id="fixActionBtn">아래 = 위치 고정</button>
  </div>

  <div class="overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-head">
        <div class="modal-title" id="modalTitle">선택</div>
        <div class="modal-desc" id="modalDesc"></div>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="saved-mask" id="savedMask"></div>

  <div class="saved-sheet" id="savedSheet">
    <div class="saved-head">
      <div class="saved-title">보관함</div>
      <div class="saved-tools">
        <button class="pill" id="copySavedBtn">목록 복사</button>
        <button class="pill gray" id="closeSavedBtn">닫기</button>
      </div>
    </div>
    <div class="saved-body" id="savedBody"></div>
  </div>

  <div class="toast" id="toast"></div>

  <input
    type="file"
    id="importFileInput"
    accept=".json,application/json,text/plain"
    style="position:fixed; left:-99999px; top:-99999px; width:1px; height:1px; opacity:0;"
  />

  <script>
    const syllables = [
      '건', '결', '경', '공', '관', '교', '권', '규', '균', '나',
      '누', '다', '단', '대', '도', '라', '락', '람', '랑', '량',
      '령', '례', '로', '론', '료', '류', '률', '리', '린', '마',
      '면', '무', '민', '바', '배', '별', '보', '본', '비', '빈',
      '사', '산', '상', '새', '석', '선', '설', '성', '세', '소',
      '손', '솔', '송', '수', '승', '시', '식', '신', '아', '안',
      '어', '여', '연', '열', '영', '예', '오', '온', '올', '우',
      '운', '울', '원', '유', '윤', '율', '은', '의', '이', '익',
      '인', '자', '작', '장', '재', '적', '전', '정', '제', '조',
      '종', '주', '준', '중', '지', '직', '진', '집', '차', '찬',
      '채', '천', '철', '초', '탐', '태', '판', '하', '한', '해',
      '헌', '혁', '현', '혜', '호', '화', '환', '회', '효', '훈',
      '휘', '희'
    ];

    const STORAGE_KEY = 'kang_name_relay_v7';
    const VERSION = 7;
    const syllablesHash = simpleHash(syllables.join('|'));

    const allNames = [];
    for (const first of syllables) {
      for (const second of syllables) {
        allNames.push({
          id: `${first}|${second}`,
          first,
          second,
          full: `강${first}${second}`
        });
      }
    }

    const defaultState = () => ({
      version: VERSION,
      syllablesHash,
      projectName: '강씨 이름 1차',
      editorName: '',
      lastEditedBy: '',
      lastSavedAt: '',
      saved: [],
      seenIds: [],
      excludedSyllables: [],
      fixedMiddle: null,
      fixedEnd: null
    });

    let state = loadState();
    let currentCard = null;
    let toastTimer = null;

    const drawer = document.getElementById('drawer');
    const toggleDrawerBtn = document.getElementById('toggleDrawerBtn');
    const deck = document.getElementById('deck');
    const statsEl = document.getElementById('stats');
    const excludeChipsEl = document.getElementById('excludeChips');
    const fixedChipsEl = document.getElementById('fixedChips');
    const projectNameInput = document.getElementById('projectName');
    const editorNameInput = document.getElementById('editorName');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const resetBtn = document.getElementById('resetBtn');
    const importFileInput = document.getElementById('importFileInput');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');
    const modalBody = document.getElementById('modalBody');
    const savedMask = document.getElementById('savedMask');
    const savedSheet = document.getElementById('savedSheet');
    const savedBody = document.getElementById('savedBody');
    const closeSavedBtn = document.getElementById('closeSavedBtn');
    const copySavedBtn = document.getElementById('copySavedBtn');
    const toastEl = document.getElementById('toast');

    projectNameInput.value = state.projectName || '';
    editorNameInput.value = state.editorName || '';

    toggleDrawerBtn.addEventListener('click', () => {
      drawer.classList.toggle('open');
    });

    projectNameInput.addEventListener('input', () => {
      state.projectName = projectNameInput.value.trim();
      persist();
      renderStats();
    });

    editorNameInput.addEventListener('input', () => {
      state.editorName = editorNameInput.value.trim();
      persist();
      renderStats();
    });

    exportBtn.addEventListener('click', exportSaveFile);

    importBtn.addEventListener('click', () => {
      importFileInput.value = '';
      importFileInput.click();
    });

    importFileInput.addEventListener('change', handleImportFile);

    resetBtn.addEventListener('click', () => {
      openChoiceModal({
        title: '전체 상태 초기화',
        desc: '현재 브라우저에 저장된 진행 상태를 모두 지웁니다. 정말 초기화할까요?',
        choices: [
          {
            label: '초기화하기',
            className: 'soft-red',
            onClick: () => {
              state = defaultState();
              projectNameInput.value = state.projectName;
              editorNameInput.value = '';
              persist();
              closeModal();
              renderAll();
              showToast('초기화했습니다');
            }
          },
          {
            label: '취소',
            className: 'cancel',
            onClick: closeModal
          }
        ]
      });
    });

    document.getElementById('saveActionBtn').addEventListener('click', () => {
      if (currentCard) swipeAction('left', currentCard);
    });

    document.getElementById('discardActionBtn').addEventListener('click', () => {
      if (currentCard) swipeAction('right', currentCard);
    });

    document.getElementById('excludeActionBtn').addEventListener('click', () => {
      if (currentCard) promptExclude(currentCard.data);
    });

    document.getElementById('fixActionBtn').addEventListener('click', () => {
      if (currentCard) promptFixStep1(currentCard.data);
    });

    savedMask.addEventListener('click', closeSavedSheet);
    closeSavedBtn.addEventListener('click', closeSavedSheet);

    copySavedBtn.addEventListener('click', async () => {
      const text = state.saved.map(x => x.full).join('\n');
      if (!text) {
        showToast('보관함이 비어 있습니다');
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        showToast('보관 목록을 복사했습니다');
      } catch (e) {
        showToast('복사에 실패했습니다');
      }
    });

    function renderAll() {
      pruneState();
      renderStats();
      renderChips();
      renderSavedSheet();
      renderCard();
    }

    function renderStats() {
      const total = allNames.length;
      const savedCount = state.saved.length;
      const seenCount = state.seenIds.length;
      const candidateCount = getFilteredPool().length;
      const remainingCount = getRemainingPool().length;
      const lastSaved = state.lastSavedAt ? new Date(state.lastSavedAt).toLocaleString('ko-KR') : '없음';
      const editor = state.lastEditedBy || '-';

      statsEl.innerHTML = [
        `전체 후보: <b>${total.toLocaleString()}</b>개`,
        `현재 조건 통과 후보: <b>${candidateCount.toLocaleString()}</b>개`,
        `아직 안 본 후보: <b>${remainingCount.toLocaleString()}</b>개`,
        `보관함: <b>${savedCount.toLocaleString()}</b>개`,
        `검토 완료: <b>${seenCount.toLocaleString()}</b>개`,
        `최근 저장: <b>${lastSaved}</b>`,
        `최근 작업자: <b>${editor}</b>`
      ].join('<br>');
    }

    function renderChips() {
      excludeChipsEl.innerHTML = '';
      fixedChipsEl.innerHTML = '';

      if (state.excludedSyllables.length === 0) {
        excludeChipsEl.innerHTML = '<span class="chip">없음</span>';
      } else {
        state.excludedSyllables.forEach(char => {
          const chip = document.createElement('span');
          chip.className = 'chip exclude';
          chip.innerHTML = `배제: ${char} <button aria-label="remove">✕</button>`;
          chip.querySelector('button').addEventListener('click', () => {
            state.excludedSyllables = state.excludedSyllables.filter(x => x !== char);
            persist();
            renderAll();
            showToast(`'${char}' 배제를 해제했습니다`);
          });
          excludeChipsEl.appendChild(chip);
        });
      }

      const fixedItems = [];
      if (state.fixedMiddle) fixedItems.push({ key: 'middle', label: `가운데 고정: ${state.fixedMiddle}` });
      if (state.fixedEnd) fixedItems.push({ key: 'end', label: `끝 고정: ${state.fixedEnd}` });

      if (fixedItems.length === 0) {
        fixedChipsEl.innerHTML = '<span class="chip">없음</span>';
      } else {
        fixedItems.forEach(item => {
          const chip = document.createElement('span');
          chip.className = 'chip fixed';
          chip.innerHTML = `${item.label} <button aria-label="remove">✕</button>`;
          chip.querySelector('button').addEventListener('click', () => {
            if (item.key === 'middle') state.fixedMiddle = null;
            if (item.key === 'end') state.fixedEnd = null;
            persist();
            renderAll();
            showToast('위치 고정을 해제했습니다');
          });
          fixedChipsEl.appendChild(chip);
        });
      }
    }

    function renderSavedSheet() {
      if (state.saved.length === 0) {
        savedBody.innerHTML = '<div class="empty">아직 보관한 이름이 없습니다.<br>카드를 왼쪽으로 스와이프하면 보관됩니다.</div>';
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'saved-grid';

      [...state.saved].reverse().forEach(item => {
        const div = document.createElement('div');
        div.className = 'saved-item';
        div.textContent = item.full;
        grid.appendChild(div);
      });

      savedBody.innerHTML = '';
      savedBody.appendChild(grid);
    }

    function openSavedSheet() {
      savedMask.classList.add('show');
      savedSheet.classList.add('show');
    }

    function closeSavedSheet() {
      savedMask.classList.remove('show');
      savedSheet.classList.remove('show');
    }

    function renderCard() {
      deck.innerHTML = '';

      const next = pickRandomRemaining();

      if (!next) {
        const empty = document.createElement('div');
        empty.className = 'card';
        empty.innerHTML = `
          <div class="name" style="font-size: clamp(34px, 8vw, 58px);">끝!</div>
          <div class="hint">
            현재 조건에서 더 이상 볼 카드가 없습니다.<br>
            배제나 위치 고정을 해제하거나, 세이브파일을 내보내세요.
          </div>
          <div class="tag-row">
            <button class="pill" id="openSavedInline">보관함 보기</button>
            <button class="pill gray" id="openDrawerInline">설정 열기</button>
          </div>
        `;
        deck.appendChild(empty);
        currentCard = null;
        empty.querySelector('#openSavedInline').addEventListener('click', openSavedSheet);
        empty.querySelector('#openDrawerInline').addEventListener('click', () => drawer.classList.add('open'));
        return;
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="name">${next.full}</div>
        <div class="hint">
          왼쪽 스와이프: 보관 · 오른쪽 스와이프: 버림<br>
          위 스와이프: 두 음절 중 하나를 전체 배제 · 아래 스와이프: 위치 고정
        </div>
        <div class="tag-row">
          <span class="mini-tag">가운데: ${next.first}</span>
          <span class="mini-tag">끝: ${next.second}</span>
          <button class="pill gray" id="savedOpenBtn">보관함</button>
        </div>
      `;
      deck.appendChild(card);
      card.querySelector('#savedOpenBtn').addEventListener('click', openSavedSheet);

      currentCard = { el: card, data: next };
      bindCardSwipe(card, next);
    }

    function bindCardSwipe(card, data) {
      let startX = 0;
      let startY = 0;
      let dx = 0;
      let dy = 0;
      let dragging = false;
      let pointerId = null;

      card.addEventListener('pointerdown', e => {
        if (modalOverlay.classList.contains('show') || savedSheet.classList.contains('show')) return;
        dragging = true;
        pointerId = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        dx = 0;
        dy = 0;
        card.classList.add('dragging');
        try { card.setPointerCapture(pointerId); } catch (err) {}
      });

      card.addEventListener('pointermove', e => {
        if (!dragging) return;
        dx = e.clientX - startX;
        dy = e.clientY - startY;
        const rotate = dx * 0.05;
        card.style.transform = `translate(${dx}px, ${dy}px) rotate(${rotate}deg)`;
      });

      const endDrag = () => {
        if (!dragging) return;
        dragging = false;
        card.classList.remove('dragging');

        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        const threshold = 78;

        if (absX > threshold && absX > absY) {
          swipeAction(dx < 0 ? 'left' : 'right', { el: card, data });
        } else if (absY > threshold && absY > absX) {
          card.style.transform = '';
          if (dy < 0) {
            promptExclude(data);
          } else {
            promptFixStep1(data);
          }
        } else {
          card.style.transform = '';
        }
      };

      card.addEventListener('pointerup', endDrag);
      card.addEventListener('pointercancel', endDrag);
      card.addEventListener('lostpointercapture', () => {
        if (dragging) endDrag();
      });
    }

    function swipeAction(direction, payload) {
      const { el, data } = payload;

      if (direction === 'left') {
        addSaved(data);
        markSeen(data.id);
        animateOut(el, -window.innerWidth * 1.2, 18);
        showToast(`보관: ${data.full}`);
      } else if (direction === 'right') {
        markSeen(data.id);
        animateOut(el, window.innerWidth * 1.2, -18);
        showToast(`버림: ${data.full}`);
      }

      setTimeout(renderAll, 180);
    }

    function animateOut(el, x, deg) {
      if (!el) return;
      el.style.transform = `translate(${x}px, 20px) rotate(${deg}deg)`;
      el.style.opacity = '0';
    }

    function promptExclude(data) {
      openChoiceModal({
        title: '어떤 음절을 배제할까요?',
        desc: `선택한 음절이 들어간 이름은 앞으로 모두 제외됩니다.`,
        choices: [
          {
            label: `'${data.first}' 배제`,
            className: 'soft-red',
            onClick: () => {
              addExclude(data.first);
              closeModal();
              renderAll();
              showToast(`'${data.first}'를 배제했습니다`);
            }
          },
          {
            label: `'${data.second}' 배제`,
            className: 'soft-red',
            onClick: () => {
              addExclude(data.second);
              closeModal();
              renderAll();
              showToast(`'${data.second}'를 배제했습니다`);
            }
          },
          {
            label: '취소',
            className: 'cancel',
            onClick: closeModal
          }
        ]
      });
    }

    function promptFixStep1(data) {
      openChoiceModal({
        title: '어떤 음절을 고정할까요?',
        desc: '고정하면 그 음절이 선택한 위치에 있는 카드들만 계속 나옵니다.',
        choices: [
          {
            label: `'${data.first}' 고정`,
            className: 'soft-blue',
            onClick: () => promptFixStep2(data.first)
          },
          {
            label: `'${data.second}' 고정`,
            className: 'soft-blue',
            onClick: () => promptFixStep2(data.second)
          },
          {
            label: '취소',
            className: 'cancel',
            onClick: closeModal
          }
        ]
      });
    }

    function promptFixStep2(char) {
      openChoiceModal({
        title: `'${char}'를 어디에 고정할까요?`,
        desc: '선택한 위치에 해당 음절이 있는 카드만 남깁니다.',
        choices: [
          {
            label: `가운데에 '${char}' 고정`,
            className: 'soft-blue',
            onClick: () => {
              state.fixedMiddle = char;
              persist();
              closeModal();
              renderAll();
              showToast(`가운데 '${char}' 고정`);
            }
          },
          {
            label: `끝에 '${char}' 고정`,
            className: 'soft-blue',
            onClick: () => {
              state.fixedEnd = char;
              persist();
              closeModal();
              renderAll();
              showToast(`끝 '${char}' 고정`);
            }
          },
          {
            label: '취소',
            className: 'cancel',
            onClick: closeModal
          }
        ]
      });
    }

    function openChoiceModal({ title, desc, choices }) {
      modalTitle.textContent = title;
      modalDesc.textContent = desc || '';
      modalBody.innerHTML = '';

      choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = `choice-btn ${choice.className || ''}`;
        btn.textContent = choice.label;
        btn.addEventListener('click', choice.onClick);
        modalBody.appendChild(btn);
      });

      modalOverlay.classList.add('show');
    }

    function closeModal() {
      modalOverlay.classList.remove('show');
    }

    modalOverlay.addEventListener('click', e => {
      if (e.target === modalOverlay) closeModal();
    });

    function getFilteredPool() {
      return allNames.filter(item => passesRules(item));
    }

    function getRemainingPool() {
      const seen = new Set(state.seenIds);
      return getFilteredPool().filter(item => !seen.has(item.id));
    }

    function pickRandomRemaining() {
      const pool = getRemainingPool();
      if (pool.length === 0) return null;
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function passesRules(item) {
      if (state.excludedSyllables.includes(item.first) || state.excludedSyllables.includes(item.second)) return false;
      if (state.fixedMiddle && item.first !== state.fixedMiddle) return false;
      if (state.fixedEnd && item.second !== state.fixedEnd) return false;
      return true;
    }

    function addExclude(char) {
      if (!state.excludedSyllables.includes(char)) {
        state.excludedSyllables.push(char);
        persist();
      }
    }

    function addSaved(item) {
      if (!state.saved.some(x => x.id === item.id)) {
        state.saved.push({
          id: item.id,
          full: item.full,
          first: item.first,
          second: item.second
        });
        persist();
      }
    }

    function markSeen(id) {
      if (!state.seenIds.includes(id)) {
        state.seenIds.push(id);
      }
      state.lastEditedBy = state.editorName || state.lastEditedBy || '';
      state.lastSavedAt = new Date().toISOString();
      persist();
    }

    function pruneState() {
      const validByRules = new Set(getFilteredPool().map(x => x.id));
      state.saved = state.saved.filter(item => validByRules.has(item.id));

      const validAll = new Set(allNames.map(x => x.id));
      state.seenIds = state.seenIds.filter(id => validAll.has(id));

      if (!state.projectName) state.projectName = '강씨 이름 1차';
      if (typeof state.editorName !== 'string') state.editorName = '';
      if (typeof state.lastEditedBy !== 'string') state.lastEditedBy = '';
      if (!Array.isArray(state.excludedSyllables)) state.excludedSyllables = [];
      if (!Array.isArray(state.saved)) state.saved = [];
      if (!Array.isArray(state.seenIds)) state.seenIds = [];
      persist();
    }

    function exportSaveFile() {
      state.projectName = projectNameInput.value.trim() || state.projectName || '강씨 이름 1차';
      state.editorName = editorNameInput.value.trim();
      state.lastEditedBy = state.editorName || state.lastEditedBy || '';
      state.lastSavedAt = new Date().toISOString();
      persist();

      const payload = {
        ...state,
        exportedAt: new Date().toISOString()
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json;charset=utf-8' });
      const a = document.createElement('a');
      const safeProject = (state.projectName || 'kang').replace(/[^\w가-힣-]+/g, '_');
      const safeEditor = (state.editorName || 'user').replace(/[^\w가-힣-]+/g, '_');
      const stamp = new Date().toISOString().replace(/[:.]/g, '-');

      a.href = URL.createObjectURL(blob);
      a.download = `${safeProject}_${safeEditor}_${stamp}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();

      setTimeout(() => URL.revokeObjectURL(a.href), 500);
      renderStats();
      showToast('세이브파일을 내보냈습니다');
    }

    async function handleImportFile(event) {
      const file = event.target.files && event.target.files[0];
      if (!file) return;

      try {
        const text = await file.text();
        const parsed = JSON.parse(String(text).trim());

        if (!parsed || typeof parsed !== 'object') {
          throw new Error('잘못된 JSON 형식입니다.');
        }

        if (parsed.syllablesHash && parsed.syllablesHash !== syllablesHash) {
          throw new Error('이 파일은 현재 음절 리스트와 맞지 않습니다.');
        }

        const nextState = {
          ...defaultState(),
          ...parsed
        };

        if (!Array.isArray(nextState.saved)) nextState.saved = [];
        if (!Array.isArray(nextState.seenIds)) nextState.seenIds = [];
        if (!Array.isArray(nextState.excludedSyllables)) nextState.excludedSyllables = [];
        if (typeof nextState.projectName !== 'string') nextState.projectName = '강씨 이름 1차';
        if (typeof nextState.editorName !== 'string') nextState.editorName = '';
        if (typeof nextState.lastEditedBy !== 'string') nextState.lastEditedBy = '';
        if (typeof nextState.fixedMiddle === 'undefined') nextState.fixedMiddle = null;
        if (typeof nextState.fixedEnd === 'undefined') nextState.fixedEnd = null;

        state = nextState;

        projectNameInput.value = state.projectName || '';
        editorNameInput.value = state.editorName || '';

        persist();
        renderAll();
        closeModal();
        closeSavedSheet();

        showToast('세이브파일을 불러왔습니다');
      } catch (err) {
        console.error(err);
        alert('불러오기 실패: ' + (err && err.message ? err.message : 'JSON 파일을 읽지 못했습니다.'));
      } finally {
        event.target.value = '';
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        if (parsed.syllablesHash !== syllablesHash) return defaultState();
        return { ...defaultState(), ...parsed };
      } catch (e) {
        return defaultState();
      }
    }

    function persist() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function simpleHash(str) {
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function showToast(message) {
      clearTimeout(toastTimer);
      toastEl.textContent = message;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    document.addEventListener('keydown', e => {
      if (!currentCard) return;
      if (modalOverlay.classList.contains('show')) return;
      if (savedSheet.classList.contains('show')) return;

      if (e.key === 'ArrowLeft') swipeAction('left', currentCard);
      if (e.key === 'ArrowRight') swipeAction('right', currentCard);
      if (e.key === 'ArrowUp') promptExclude(currentCard.data);
      if (e.key === 'ArrowDown') promptFixStep1(currentCard.data);
    });

    renderAll();
  </script>
</body>
</html>
